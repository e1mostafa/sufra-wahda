user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    # ─── Basic Settings ─────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # ─── Logging ────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # ─── Performance ────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;
    client_max_body_size 20m;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_comp_level 6;
    gzip_min_length 1000;

    # ─── Rate Limiting ───────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=otp_limit:10m rate=3r/m;

    # ─── SSL Settings ────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ─── Security Headers ────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Permissions-Policy        "geolocation=(self) camera=() microphone=()" always;

    # ─── Upstream ────────────────────────────────────────────────────
    upstream api_backend {
        server api:5000;
        keepalive 32;
    }
    upstream customer_frontend {
        server customer-web:3000;
        keepalive 16;
    }
    upstream restaurant_frontend {
        server restaurant-dashboard:3001;
        keepalive 8;
    }
    upstream admin_frontend {
        server admin-panel:3002;
        keepalive 8;
    }
    upstream driver_frontend {
        server driver-panel:3003;
        keepalive 8;
    }

    # ─── Redirect HTTP → HTTPS ───────────────────────────────────────
    server {
        listen 80;
        server_name sufra-wahda.com www.sufra-wahda.com
                    api.sufra-wahda.com
                    restaurant.sufra-wahda.com
                    admin.sufra-wahda.com
                    driver.sufra-wahda.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── API Server ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.sufra-wahda.com;

        ssl_certificate     /etc/letsencrypt/live/api.sufra-wahda.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.sufra-wahda.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # API endpoints
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "keep-alive";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Auth rate limiting
        location /api/v1/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/auth/send-otp {
            limit_req zone=otp_limit burst=2 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SignalR WebSocket
        location /hubs/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Health check (no auth)
        location /health {
            proxy_pass http://api_backend;
            access_log off;
        }

        # Swagger (dev only - disable in production)
        location /swagger {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }
    }

    # ─── Customer Website ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name sufra-wahda.com www.sufra-wahda.com;

        ssl_certificate     /etc/letsencrypt/live/sufra-wahda.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sufra-wahda.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' https://api.sufra-wahda.com wss://api.sufra-wahda.com;" always;

        # Next.js static assets
        location /_next/static/ {
            proxy_pass http://customer_frontend;
            proxy_cache_bypass 1;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        location / {
            proxy_pass         http://customer_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "keep-alive";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }

    # ─── Restaurant Dashboard ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name restaurant.sufra-wahda.com;

        ssl_certificate     /etc/letsencrypt/live/restaurant.sufra-wahda.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/restaurant.sufra-wahda.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass         http://restaurant_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ─── Admin Panel ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name admin.sufra-wahda.com;

        ssl_certificate     /etc/letsencrypt/live/admin.sufra-wahda.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.sufra-wahda.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Restrict admin to specific IPs in production (uncomment and add your IPs):
        # allow 1.2.3.4;
        # deny all;

        location / {
            proxy_pass         http://admin_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ─── Driver Panel ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name driver.sufra-wahda.com;

        ssl_certificate     /etc/letsencrypt/live/driver.sufra-wahda.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/driver.sufra-wahda.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass         http://driver_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
